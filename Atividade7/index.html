<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Funções JS</h1>

<div class="container">

    <!-- 1) Maior número -->
    <section>
        <h2>Maior de três números</h2>
        <input type="number" id="n1">
        <input type="number" id="n2">
        <input type="number" id="n3">
        <button onclick="maiorNumero()">Calcular</button>
        <p id="res1"></p>
    </section>

    <!-- 2) Ordem crescente -->
    <section>
        <h2>Ordem crescente</h2>
        <input type="number" id="o1">
        <input type="number" id="o2">
        <input type="number" id="o3">
        <button onclick="ordemCrescente()">Ordenar</button>
        <p id="res2"></p>
    </section>

    <!-- 3) Palíndromo -->
    <section>
        <h2>Palíndromo</h2>
        <input type="text" id="texto">
        <button onclick="verificarPalindromo()">Verificar</button>
        <p id="res3"></p>
    </section>

    <!-- 4) Subconjunto -->
    <section>
        <h2>Subconjunto</h2>
        <input type="text" id="p1" placeholder="Palavra 1">
        <input type="text" id="p2" placeholder="Palavra 2">
        <button onclick="verificarSubconjunto()">Verificar</button>
        <p id="res4"></p>
    </section>

    <!-- 5) Dia da semana -->
    <section>
        <h2>Dia da semana</h2>
        <input type="date" id="data">
        <button onclick="diaSemana()">Descobrir</button>
        <p id="res5"></p>
    </section>

</div>

<script src="funcoes.js"></script>
</body>
</html>
